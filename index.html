<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">Food </h1>

    <div class="gallery">

        <div class="card">
            <img src="pizza.jpg" alt="Pizza">
            <h2>Pizza</h2>
            <p>Delicious cheese pizza.</p>
        </div>

        <div class="card">
            <img src="burger.jpg" alt="Burger">
            <h2>Burger</h2>
            <p>Tasty beef burger.</p>
        </div>

        <div class="card">
            <img src="baasto.jpg" alt="Baasto">
            <h2>Baasto</h2>
            <p>Traditional Somali pasta.</p>
        </div>

        <div class="card">
            <img src="tea.jpg" alt="Somali Tea">
            <h2>Somali Tea</h2>
            <p>Hot and sweet tea.</p>
        </div>

        <div class="card">
            <img src="cake.jpg" alt="Cake">
            <h2>Cake</h2>
            <p>Fresh chocolate cake.</p>
        </div>

        <div class="card">
            <img src="juice.jpg" alt="Juice">
            <h2>Juice</h2>
            <p>Natural fruit juice.</p>
        </div>

        <div class="card">
            <img src="chicken.jpg" alt="Chicken">
            <h2>Chicken</h2>
            <p>Grilled chicken meal.</p>
        </div>

        <div class="card">
            <img src="icecream.jpg" alt="Ice Cream">
            <h2>Ice Cream</h2>
            <p>Cold and sweet dessert.</p>
        </div>

    </div>

</body>
</html>
